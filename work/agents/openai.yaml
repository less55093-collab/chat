interface:
  display_name: "Work"
  short_description: "Execute confirmed plans by complexity mode"
  default_prompt: "Use $work after I have explicitly approved a $chat plan. Follow the plan's execution mode: simple-main for small direct main-agent tasks without WORK_STATE.md or child agents, state-main for resumable main-agent execution with WORK_STATE.md, and delegated-state for child-agent implementation with file access requests and main-agent verification."
